
services:
  postgres:
    image: postgres:15-alpine
    container_name: fitweb-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: jinnx_fitweb_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fitweb-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fitweb-kafka
    ports: 
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped


  # ── Services ──────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: .                             # root so Dockerfile can COPY shared/ + proto/
      dockerfile: services/auth/Dockerfile
    container_name: fitweb-auth
    ports:
      - "50051:50051"
    environment:
      - DATABASE_URL=postgres://postgres:123@postgres:5432/jinnx_fitweb_db?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
      - JWT_EXPIRY_MINUTES=${JWT_EXPIRY_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRY_DAYS=${REFRESH_TOKEN_EXPIRY_DAYS:-30}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  subscription-service:
    build:
      context: .
      dockerfile: services/subscription/Dockerfile
    container_name: fitweb-subscription
    ports:
      - "50052:50052"
    environment:
      - DATABASE_URL=postgres://postgres:123@postgres:5432/jinnx_fitweb_db?sslmode=disable
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - RAZORPAY_PLAN_ID=${RAZORPAY_PLAN_ID}
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  workout-service:
    build:
      context: .
      dockerfile: services/workout/Dockerfile
    container_name: fitweb-workout
    ports:
      - "50053:50053"
    environment:
      - DATABASE_URL=postgres://postgres:123@postgres:5432/jinnx_fitweb_db?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  chat-service:
    build:
      context: .
      dockerfile: services/chat/Dockerfile
    container_name: fitweb-chat
    ports:
      - "50054:50054"
    environment:
      - DATABASE_URL=postgres://postgres:123@postgres:5432/jinnx_fitweb_db?sslmode=disable
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CHATBOT_DAILY_LIMIT_FREE=${CHATBOT_DAILY_LIMIT_FREE:-20}
      - CHATBOT_MAX_HISTORY=${CHATBOT_MAX_HISTORY:-10}
      - WORKOUT_SERVICE_ADDR=workout-service:50053
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      workout-service:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped

  video-service:
    build:
      context: .
      dockerfile: services/video/Dockerfile
    container_name: fitweb-video
    ports:
      - "50055:50055"
    environment:
      - DATABASE_URL=postgres://postgres:123@postgres:5432/jinnx_fitweb_db?sslmode=disable
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_HOST=${LIVEKIT_HOST}
      - AUTH_SERVICE_ADDR=auth-service:50051
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  # ── API Gateway ───────────────────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: fitweb-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - APP_ENV=development
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
      - AUTH_SERVICE_ADDR=auth-service:50051
      - SUBSCRIPTION_SERVICE_ADDR=subscription-service:50052
      - WORKOUT_SERVICE_ADDR=workout-service:50053
      - CHAT_SERVICE_ADDR=chat-service:50054
      - VIDEO_SERVICE_ADDR=video-service:50055
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      subscription-service:
        condition: service_started
      workout-service:
        condition: service_started
      chat-service:
        condition: service_started
      video-service:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  kafkadata: