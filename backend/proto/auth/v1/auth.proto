syntax = "proto3";

package auth.v1;

option go_package = "github.com/akhilbabu26/jinnx-fitweb/backend2/proto/auth/v1;authv1";

service AuthService {
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc VerifyOTP (VerifyOTPRequest) returns (VerifyOTPResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc GetUserProfile (GetUserProfileRequest) returns (GetUserProfileResponse);
  rpc GetTrainerTasks (GetTrainerTasksRequest) returns (GetTrainerTasksResponse);
  rpc MarkTaskCompleted (MarkTaskCompletedRequest) returns (MarkTaskCompletedResponse);
  rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);
  // Admin RPCs
  rpc ListPendingUsers (ListPendingUsersRequest) returns (ListPendingUsersResponse);
  rpc UpdateUserStatus (UpdateUserStatusRequest) returns (UpdateUserStatusResponse);
  rpc BlockUser (BlockUserRequest) returns (BlockUserResponse);
  rpc UnblockUser (UnblockUserRequest) returns (UnblockUserResponse);
  rpc ListAllUsers (ListAllUsersRequest) returns (ListAllUsersResponse);
  rpc AssignTask (AssignTaskRequest) returns (AssignTaskResponse);
  rpc DeleteTask (DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc ResendOTP (ResendOTPRequest) returns (ResendOTPResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
}

message RegisterResponse {
  uint32 user_id = 1;
  string status = 2;
  string message = 3;
}

message VerifyOTPRequest {
  string email = 1;
  string code  = 2;
}

message VerifyOTPResponse {
  bool   success = 1;
  string message = 2;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  uint32 user_id = 3;
  string role = 4;
}

message GetUserProfileRequest {
  uint32 user_id = 1;
}

message GetUserProfileResponse {
  uint32 id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
  string status = 5;
}

message GetTrainerTasksRequest {
  uint32 user_id = 1;
}

message Task {
  uint32 id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string due_date = 5;
}

message GetTrainerTasksResponse {
  repeated Task tasks = 1;
}

message MarkTaskCompletedRequest {
  uint32 task_id = 1;
  uint32 user_id = 2;
}

message MarkTaskCompletedResponse {
  bool success = 1;
  string message = 2;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ForgotPasswordResponse {
  bool success = 1;
  string message = 2;
}

message ResetPasswordRequest {
  string email = 1;
  string code = 2;
  string new_password = 3;
}

message ResetPasswordResponse {
  bool success = 1;
  string message = 2;
}

// ── Admin messages ─────────────────────────────────────────────────────────

message PendingUser {
  uint32 id    = 1;
  string email = 2;
  string name  = 3;
  string role  = 4;
  string status = 5;
  string created_at = 6;
}

message ListPendingUsersRequest {}

message ListPendingUsersResponse {
  repeated PendingUser users = 1;
}

message UpdateUserStatusRequest {
  uint32 user_id  = 1;
  string status   = 2; // "approved" or "rejected"
  uint32 admin_id = 3;
}

message UpdateUserStatusResponse {
  bool   success = 1;
  string message = 2;
}

message BlockUserRequest {
  uint32 admin_id = 1;
  uint32 user_id  = 2;
}

message BlockUserResponse {
  bool   success = 1;
  string message = 2;
}

message UnblockUserRequest {
  uint32 admin_id = 1;
  uint32 user_id  = 2;
}

message UnblockUserResponse {
  bool   success = 1;
  string message = 2;
}

message ListAllUsersRequest {}

message ListAllUsersResponse {
  repeated PendingUser users = 1;
}

message AssignTaskRequest {
  uint32 admin_id = 1;
  uint32 user_id = 2;
  string title = 3;
  string description = 4;
  string due_date = 5;
}

message AssignTaskResponse {
  uint32 task_id = 1;
  bool success = 2;
}

message DeleteTaskRequest {
  uint32 admin_id = 1;
  uint32 task_id = 2;
}

message DeleteTaskResponse {
  bool success = 1;
}

message ResendOTPRequest {
  string email = 1;
}

message ResendOTPResponse {
  bool success = 1;
  string message = 2;
}