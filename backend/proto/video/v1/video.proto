syntax = "proto3";

package video.v1;

option go_package = "github.com/akhilbabu26/jinnx-fitweb/backend2/proto/video/v1;videov1";

service VideoService {
  rpc CreateSessionToken (CreateSessionTokenRequest) returns (CreateSessionTokenResponse);
  rpc GetSessionList (GetSessionListRequest) returns (GetSessionListResponse);
  rpc CreateRoom (CreateRoomRequest) returns (CreateRoomResponse);
  rpc GenerateToken (GenerateTokenRequest) returns (GenerateTokenResponse);
  rpc EndSession (EndSessionRequest) returns (EndSessionResponse);
}

message CreateSessionTokenRequest {
  uint32 user_id = 1;
  string room_name = 2;
}

message CreateSessionTokenResponse {
  string token = 1;
  string livekit_url = 2;
}

message GetSessionListRequest {
  uint32 user_id = 1;
}

message VideoSession {
  uint32 id = 1;
  string room_name = 2;
  string title = 3;
  string scheduled_at = 4;
}

message GetSessionListResponse {
  repeated VideoSession sessions = 1;
}

message CreateRoomRequest {
  uint32 admin_id = 1;
  uint32 user_id = 2;
}

message CreateRoomResponse {
  string room_name = 1;
  uint32 session_id = 2;
  bool success = 3;
}

message GenerateTokenRequest {
  uint32 user_id = 1;
  string room_name = 2;
  bool is_admin = 3;
}

message GenerateTokenResponse {
  string token = 1;
  string livekit_url = 2;
}

message EndSessionRequest {
  uint32 admin_id = 1;
  uint32 session_id = 2;
}

message EndSessionResponse {
  bool success = 1;
}
